# ReMoM.ini — New Game Configuration
#
# Used with:  ReMoMber --newgame [ReMoM.ini]
#             ReMoMber --headless --newgame ReMoM.ini --replay game.RMR
#
# All keys are optional. Unspecified keys use defaults.
# Lines starting with # or ; are comments.
# Values are case-insensitive.


[Game]

# difficulty = Intro | Easy | Normal | Hard | Impossible  (default: Easy)
difficulty = Normal

# magic = Weak | Normal | Powerful  (default: Normal)
magic = Normal

# landsize = Small | Medium | Large  (default: Medium)
landsize = Medium

# opponents = 0..4  (default: 1)
opponents = 3

# seed = fixed RNG seed for deterministic world generation (default: random)
# When set, the same config always produces the same world.
# Accepts decimal or hex (0x...) values.
# seed = 12345


[Wizard]

# wizard = Merlin | Raven | Sharee | Lo Pan | Jafar | Oberic | Rjak | Sss'ra
#          Tauron | Freya | Horus | Ariel | Tlaloc | Kali
# Selects a preset wizard (sets default books, retort, and name).
# Individual books/retorts below override the preset values.
wizard = Merlin

# name = custom wizard name (up to 19 characters, default: preset name)
# name = MyWizard

# race = Barbarian | Beastmen | Dark Elf | Draconian | Dwarf | Gnoll | Halfling
#        High Elf | High Men | Klackon | Lizardman | Nomad | Orc | Troll
# (default: High Men)
race = High Men

# banner = Blue | Green | Purple | Red | Yellow | Brown  (default: Blue)
banner = Blue


[Books]

# Spell book counts per realm (0..13).
# If not specified, the preset wizard's books are used.
# books_nature = 5
# books_sorcery = 0
# books_chaos = 0
# books_life = 5
# books_death = 0


[Retorts]

# Wizard Special Abilities: T or F
# If not specified, the preset wizard's retort is used.
# Only the specified retorts are overridden; others keep the preset value.
#
# Alchemy = F
# Warlord = F
# Chaos Mastery = F
# Nature Mastery = F
# Sorcery Mastery = F
# Infernal Power = F
# Divine Power = F
# Sage Master = F
# Channeler = F
# Myrran = F
# Archmage = F
# Mana Focusing = F
# Node Mastery = F
# Famous = F
# Runemaster = F
# Conjurer = F
# Charismatic = F
# Artificer = F


[Paths]

# Where ReMoMber writes its logs and its saves.
#
# "." means the current working directory -- i.e. next to the executable.  That is what a repo /
# development build wants: logs and saves land in out/build/<preset>/bin/<config>/ where you can
# see them, instead of in the per-user directories.
#
# This file is a dev/modder template and is deliberately NOT bundled in a player's install, so an
# installed game finds no [Paths] and keeps the per-user defaults:
#     logs   %LOCALAPPDATA%\ReMoM\logs   (XDG_STATE_HOME/ReMoM)
#     saves  %APPDATA%\ReMoM             (XDG_DATA_HOME/ReMoM)
#
# Precedence for logs:  REMOM_LOG_DIR (env)  ->  log_dir  ->  per-user state dir  ->  CWD
# Precedence for saves: save_dir  ->  per-user data dir
#
# Comment either key out to fall back to the per-user directory for that kind of file.

log_dir = .
save_dir = .


[Logging]
severity_threshold = DEBUG   # renders/normal play: DEBUG and up; TRACE (incl. [GD] dumps) filtered

# severity_threshold = TRACE | DEBUG | INFO | WARN | ERROR | FATAL  (default: TRACE)
# Messages below this severity are filtered at runtime.
# The compile-time floor (STU_LOG_MIN_SEVERITY) wins if it is higher.
# severity_threshold = INFO

# Per-category enables. Any category not listed defaults to true.
# Disable a noisy subsystem when you don't need it.
# GENERAL = true
# AIMOVE  = true
# COMBAT  = true
# SAVE    = true
# PFL     = true
# IKI     = true
