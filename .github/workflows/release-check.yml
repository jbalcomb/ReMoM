# Release-build gate. Runs on every push and PR to enforce that the
# MSVC-release preset still configures, builds, and tests cleanly.
# Pure pass/fail — no artifact upload on success, no packaging.
# Tag-driven packaging lives in release.yml and is unaffected by this workflow.

name: Release Check

on:
  push:
    branches-ignore:
      - develop
      - current
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:

  format-check:
    name: clang-format (changed files)
    # Only gate PRs: a push has no natural diff base, and the tree as a whole is
    # intentionally not clang-format-clean (heavy hand-alignment). We check only
    # the files a PR touches, via tools/format.sh --since.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pinned clang-format (LLVM 20)
        run: pipx install "clang-format==20.1.8"

      - name: Check formatting of changed files
        run: ./tools/format.sh check --since "${{ github.event.pull_request.base.sha }}"

  windows-release:
    name: Windows MSVC Release
    # Pinned: windows-latest now ships VS2026, but the MSVC-release preset uses the
    # "Visual Studio 17 2022" generator. windows-2022 is the image that has VS2022.
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6

      # No build-dir cache here: MSVC-release just flipped from Win32 to SDL2, and a
      # restored stale cache would keep USE_WIN32=TRUE (cache vars persist) and
      # silently build the wrong backend. Fresh configure each run.
      - name: Fetch SDL2 + SDL2_mixer (VC dev libraries)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /c/devellib && cd /c/devellib
          curl -fSL -o SDL2.zip       https://github.com/libsdl-org/SDL/releases/download/release-2.32.2/SDL2-devel-2.32.2-VC.zip
          curl -fSL -o SDL2_mixer.zip https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.1/SDL2_mixer-devel-2.8.1-VC.zip
          unzip -q SDL2.zip
          unzip -q SDL2_mixer.zip
          ls -d SDL2-2.32.2 SDL2_mixer-2.8.1   # fail early if the extracted names differ

      - name: Configure (MSVC-release preset)
        run: cmake --preset MSVC-release

      - name: Build (MSVC-release preset)
        run: cmake --build --preset MSVC-release

      - name: Test (MSVC-release preset)
        run: ctest --preset MSVC-release --output-on-failure --timeout 120 --label-exclude integration --exclude-regex "Reload_Melee_Sound_test"

      # Packaging smoke test. release.yml only packages on a tag push, so without
      # this a broken CPack/NSIS config would not surface until a real release.
      # We carry a repo-local cmake/NSIS.template.in overriding CPack's stock
      # template (per-user install, no UAC, Start Menu shortcuts) -- this step is
      # what catches a regression in it, or a mismatch with the runner's CMake.
      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Package smoke test (ZIP + NSIS installer)
        shell: bash
        # CMAKE_INSTALL_BINDIR=. mirrors release.yml's flat package layout, so the
        # generated shortcut paths are exercised exactly as they ship.
        run: |
          set -euo pipefail
          cmake --preset MSVC-release -DCMAKE_INSTALL_BINDIR=.
          cmake --build out/build/MSVC-release --config Release --target package

      - name: Verify packages were produced
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          zips=(out/build/MSVC-release/ReMoM-*.zip)
          exes=(out/build/MSVC-release/ReMoM-*.exe)
          echo "ZIP: ${zips[*]:-<none>}"
          echo "EXE: ${exes[*]:-<none>}"
          [ ${#zips[@]} -gt 0 ] || { echo "::error::CPack produced no ZIP"; exit 1; }
          [ ${#exes[@]} -gt 0 ] || { echo "::error::CPack produced no NSIS installer"; exit 1; }
          # Guard the template override: the installer must be per-user (no UAC) and
          # install under %LOCALAPPDATA%, not Program Files.
          nsi=out/build/MSVC-release/_CPack_Packages/win64/NSIS/project.nsi
          # -F (fixed string): these contain '$' and '\', which are painful to escape
          # correctly as a regex. Match them literally instead.
          grep -qF 'RequestExecutionLevel user' "$nsi" || { echo "::error::NSIS template override lost: expected 'RequestExecutionLevel user'"; exit 1; }
          grep -qF 'InstallDir "$LOCALAPPDATA\ReMoM"' "$nsi" || { echo "::error::NSIS InstallDir is not the expected per-user LOCALAPPDATA path"; exit 1; }
          echo "Packaging smoke test passed."

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cmake-logs-windows-${{ github.run_id }}
          path: |
            out/build/MSVC-release/CMakeFiles/CMakeOutput.log
            out/build/MSVC-release/CMakeFiles/CMakeError.log
            out/build/MSVC-release/**/*.log
          if-no-files-found: ignore
          retention-days: 7

  linux-release:
    name: Linux Clang Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools and SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build clang pkg-config libsdl2-dev libsdl2-mixer-dev

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: out/build/clang-release
          key: cmake-${{ runner.os }}-clang-release-${{ hashFiles('CMakePresets.json', '**/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-clang-release-

      - name: Configure (clang-release preset)
        run: cmake --preset clang-release

      - name: Build
        run: cmake --build out/build/clang-release

      - name: Test
        run: ctest --test-dir out/build/clang-release --output-on-failure --timeout 120 --label-exclude integration --exclude-regex "Reload_Melee_Sound_test"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cmake-logs-linux-${{ github.run_id }}
          path: |
            out/build/clang-release/CMakeFiles/CMakeOutput.log
            out/build/clang-release/CMakeFiles/CMakeError.log
            out/build/clang-release/**/*.log
          if-no-files-found: ignore
          retention-days: 7

  deb-package:
    name: Linux .deb packaging
    # Same runner as the release job: pinned for the GLIBC FLOOR, and it also
    # proves ReMoM still builds against 22.04's older SDL2 headers.
    runs-on: ubuntu-22.04
    # Packaging gate only -- linux-release above already runs the test suite on
    # the same code, so this job skips ctest and checks that the .deb still
    # builds and still contains exactly what it should.

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools and SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build clang pkg-config \
                                  libsdl2-dev libsdl2-mixer-dev dpkg-dev lintian

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: out/build/linux-package-release
          key: cmake-${{ runner.os }}-linux-package-release-${{ hashFiles('CMakePresets.json', '**/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-linux-package-release-

      - name: Configure (linux-package-release preset, FHS layout)
        run: cmake --preset linux-package-release

      - name: Build
        run: cmake --build out/build/linux-package-release

      - name: Build .deb
        run: cd out/build/linux-package-release && cpack -G DEB

      - name: Verify package contents and metadata
        run: |
          set -euo pipefail
          DEB="$(ls out/build/linux-package-release/remom_*_*.deb)"
          dpkg -I "$DEB"
          dpkg -c "$DEB"

          ACTUAL="$(dpkg -c "$DEB" | awk '$1 !~ /^d/ {print $6}' | sed 's|^\./|/|' | sort)"
          EXPECTED="$(printf '%s\n' \
            /usr/bin/ReMoM \
            /usr/share/applications/remom.desktop \
            /usr/share/doc/remom/PLAYING.md \
            /usr/share/doc/remom/changelog.gz \
            /usr/share/doc/remom/copyright \
            /usr/share/icons/hicolor/256x256/apps/remom.png \
            /usr/share/lintian/overrides/remom \
            /usr/share/man/man6/ReMoM.6.gz | sort)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::packaged file set changed"; diff <(echo "$EXPECTED") <(echo "$ACTUAL"); exit 1
          fi

          dpkg -I "$DEB" | grep -q 'Depends:.*libsdl2-2\.0-0' \
            || { echo "::error::no libsdl2 dependency -- shlibdeps did not run?"; exit 1; }
          dpkg -I "$DEB" | grep -q 'Depends:.*libsdl2-mixer' \
            || { echo "::error::no libsdl2-mixer dependency -- was audio disabled?"; exit 1; }

      - name: Lint the package (lintian, non-blocking)
        continue-on-error: true
        run: lintian --no-tag-display-limit out/build/linux-package-release/remom_*_*.deb

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cmake-logs-deb-${{ github.run_id }}
          path: |
            out/build/linux-package-release/CMakeFiles/CMakeOutput.log
            out/build/linux-package-release/CMakeFiles/CMakeError.log
            out/build/linux-package-release/**/*.log
          if-no-files-found: ignore
          retention-days: 7

  macos-release:
    name: macOS Clang Release
    runs-on: macos-latest
    # TBD (deferred, non-blocking): pack(2) DOS structs place native pointers at
    # non-8-byte-aligned offsets, which the arm64 macOS linker rejects. Link fails
    # on arm64; x86-64 Linux/Windows are fine. See RELEASES.md "Known limitations".
    if: false

    steps:
      - uses: actions/checkout@v6

      - name: Install SDL2 and tools
        run: brew install sdl2 sdl2_mixer ninja

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: out/build/macos-release
          key: cmake-${{ runner.os }}-macos-release-${{ hashFiles('CMakePresets.json', '**/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-macos-release-

      - name: Configure (macos-release preset)
        run: cmake --preset macos-release -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build out/build/macos-release

      - name: Test
        run: ctest --test-dir out/build/macos-release --output-on-failure --timeout 120 --label-exclude integration --exclude-regex "Reload_Melee_Sound_test"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cmake-logs-macos-${{ github.run_id }}
          path: |
            out/build/macos-release/CMakeFiles/CMakeOutput.log
            out/build/macos-release/CMakeFiles/CMakeError.log
            out/build/macos-release/**/*.log
          if-no-files-found: ignore
          retention-days: 7
