# Build and publish a release. Trigger by pushing a tag:  git push origin v0.0.1
# Or dry-run a build (no publish) from the Actions tab:   gh workflow run release.yml -f tag=v0.0.1
#
# The git tag is the single source of truth for the version. It is passed into
# every build as -DREMOM_VERSION=<tag without leading v>, so all artifact names
# (ZIP / NSIS / AppImage / macOS ZIP) and the in-app version banner agree.
# Each platform builds, runs the test suite (release gate), then packages.
# Publishing only happens on a real tag push, and produces a DRAFT release.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to build (e.g. v0.0.1). Leave blank to build HEAD as 0.0.0-dev.'
        required: false

permissions:
  contents: write

env:
  # ctest selection shared by every platform's release gate.
  CTEST_ARGS: '--output-on-failure --timeout 120 --label-exclude integration --exclude-regex Reload_Melee_Sound_test'

jobs:

  # ── Windows (MSVC, native Win32 backend, ZIP + NSIS) ──────────────────
  windows:
    name: Windows x64
    # Pinned: windows-latest now ships VS2026, but the MSVC-release preset uses the
    # "Visual Studio 17 2022" generator. windows-2022 is the image that has VS2022.
    runs-on: windows-2022
    # Run every step under bash: the default PowerShell mangles the cmake arg
    # `-DREMOM_VERSION=0.0.1` into a stray `.0.1` path. bash is proven on this
    # runner (the version step already uses it) and parses args like Linux/macOS.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then RAW="${{ inputs.tag }}";
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then RAW="$GITHUB_REF_NAME";
          else RAW="0.0.0-dev"; fi
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${RAW#v}"

      - name: Fetch SDL2 + SDL2_mixer (VC dev libraries)
        # MSVC-release is now the SDL2 backend; the runner has no SDL2, so fetch the
        # official VC dev packages to the exact paths CMakeLists.txt looks for.
        run: |
          set -euo pipefail
          mkdir -p /c/devellib && cd /c/devellib
          curl -fSL -o SDL2.zip       https://github.com/libsdl-org/SDL/releases/download/release-2.32.2/SDL2-devel-2.32.2-VC.zip
          curl -fSL -o SDL2_mixer.zip https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.1/SDL2_mixer-devel-2.8.1-VC.zip
          unzip -q SDL2.zip
          unzip -q SDL2_mixer.zip
          ls -d SDL2-2.32.2 SDL2_mixer-2.8.1   # fail early if the extracted names differ

      - name: Configure (MSVC-release preset)
        # CMAKE_INSTALL_BINDIR=. keeps the portable ZIP / NSIS layout flat
        # (ReMoM at the package root); a plain local install uses bin/.
        run: cmake --preset MSVC-release -DREMOM_VERSION=${{ steps.ver.outputs.version }} -DCMAKE_INSTALL_BINDIR=.

      - name: Build
        run: cmake --build out/build/MSVC-release --config Release

      - name: Test (release gate)
        run: ctest --preset MSVC-release ${{ env.CTEST_ARGS }}

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Package (ZIP + NSIS installer)
        run: cmake --build out/build/MSVC-release --config Release --target package

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ReMoM-windows-x64
          path: |
            out/build/MSVC-release/ReMoM-*.zip
            out/build/MSVC-release/ReMoM-*.exe

  # ── Linux (Clang, SDL2, self-contained AppImage via linuxdeploy) ───────
  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then RAW="${{ inputs.tag }}";
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then RAW="$GITHUB_REF_NAME";
          else RAW="0.0.0-dev"; fi
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${RAW#v}"

      - name: Install build tools and SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build clang pkg-config file libsdl2-dev libsdl2-mixer-dev

      - name: Configure (clang-release preset)
        # CMAKE_INSTALL_BINDIR=. keeps the portable ZIP / TGZ layout flat
        # (ReMoM at the package root); a plain local install uses bin/.
        run: cmake --preset clang-release -DREMOM_VERSION=${{ steps.ver.outputs.version }} -DCMAKE_INSTALL_BINDIR=.

      - name: Build
        run: cmake --build out/build/clang-release

      - name: Test (release gate)
        run: ctest --test-dir out/build/clang-release ${{ env.CTEST_ARGS }}

      - name: Build AppImage (linuxdeploy bundles SDL2)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          export APPIMAGE_EXTRACT_AND_RUN=1   # ubuntu-24.04 runners lack libfuse2

          curl -fSL -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fSL -o linuxdeploy-plugin-appimage https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-appimage
          export PATH="$PWD:$PATH"

          REMOM_BIN="$(find out/build/clang-release/bin -type f -name ReMoM | head -1)"
          echo "Bundling: $REMOM_BIN"
          export OUTPUT="ReMoM-${VERSION}-x86_64.AppImage"
          ./linuxdeploy \
            --appdir AppDir \
            --executable "$REMOM_BIN" \
            --desktop-file packaging/remom.desktop \
            --icon-file packaging/remom.png \
            --custom-apprun "$GITHUB_WORKSPACE/packaging/AppRun" \
            --output appimage

      - name: Package binaries (ZIP + TGZ, engine-only)
        run: cmake --build out/build/clang-release --target package

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ReMoM-linux-x86_64
          path: |
            ReMoM-*.AppImage
            out/build/clang-release/ReMoM-*-Linux-*.zip
            out/build/clang-release/ReMoM-*-Linux-*.tar.gz

  # ── Linux .deb (native distro package; depends on the distro's SDL2) ───
  #
  # Separate from the `linux` job on purpose: that one builds the FLAT layout
  # (CMAKE_INSTALL_BINDIR=.) for the portable ZIP/TGZ + AppImage, while a .deb
  # needs the FHS layout (bin/, share/). One build dir cannot serve both, so the
  # linux-package-release preset gets its own. See PRD-Linux-Package-Install.md.
  deb:
    name: Linux .deb (amd64)
    # Pinned for the GLIBC FLOOR, not for recency: a package built on a newer
    # runner silently refuses to install on older distros. ubuntu-22.04 (glibc
    # 2.35) covers Ubuntu 22.04+ and Debian 12+. Do not bump to -latest.
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then RAW="${{ inputs.tag }}";
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then RAW="$GITHUB_REF_NAME";
          else RAW="0.0.0-dev"; fi
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${RAW#v}"

      - name: Install build tools and SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build clang pkg-config file \
                                  libsdl2-dev libsdl2-mixer-dev dpkg-dev lintian

      - name: Configure (linux-package-release preset, FHS layout)
        run: cmake --preset linux-package-release -DREMOM_VERSION=${{ steps.ver.outputs.version }}

      - name: Build
        run: cmake --build out/build/linux-package-release

      - name: Test (release gate)
        run: ctest --test-dir out/build/linux-package-release ${{ env.CTEST_ARGS }}

      - name: Build .deb
        run: cd out/build/linux-package-release && cpack -G DEB

      - name: Verify package contents and metadata
        run: |
          set -euo pipefail
          DEB="$(ls out/build/linux-package-release/remom_*_*.deb)"
          echo "::group::dpkg -I"; dpkg -I "$DEB"; echo "::endgroup::"
          echo "::group::dpkg -c"; dpkg -c "$DEB"; echo "::endgroup::"

          # Engine-only: exactly these files, nothing else. No .LBX, no saves, no
          # test fixtures, no bundled libSDL2.
          ACTUAL="$(dpkg -c "$DEB" | awk '$1 !~ /^d/ {print $6}' | sed 's|^\./|/|' | sort)"
          EXPECTED="$(printf '%s\n' \
            /usr/bin/ReMoM \
            /usr/share/applications/remom.desktop \
            /usr/share/doc/remom/PLAYING.md \
            /usr/share/doc/remom/changelog.gz \
            /usr/share/doc/remom/copyright \
            /usr/share/icons/hicolor/256x256/apps/remom.png \
            /usr/share/lintian/overrides/remom \
            /usr/share/man/man6/ReMoM.6.gz | sort)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::packaged file set changed"; diff <(echo "$EXPECTED") <(echo "$ACTUAL"); exit 1
          fi

          # The shipped binary must be stripped -- an unstripped one roughly
          # doubles the download and is a lintian error.
          dpkg-deb --fsys-tarfile "$DEB" | tar -xO ./usr/bin/ReMoM > /tmp/ReMoM.bin
          file /tmp/ReMoM.bin | grep -q 'not stripped' \
            && { echo "::error::shipped binary is not stripped"; exit 1; } || true

          # Dependencies must be DERIVED and must include SDL2 -- a package that
          # bundles SDL2, or that lost the dependency, is a packaging bug.
          dpkg -I "$DEB" | grep -q 'Depends:.*libsdl2-2\.0-0' \
            || { echo "::error::no libsdl2 dependency -- shlibdeps did not run?"; exit 1; }
          dpkg -I "$DEB" | grep -q 'Depends:.*libsdl2-mixer' \
            || { echo "::error::no libsdl2-mixer dependency -- was audio disabled?"; exit 1; }

          # Record the glibc floor in the log so a bump is visible in the diff of
          # a CI run rather than discovered by a user on an older distro.
          dpkg -I "$DEB" | grep -o 'libc6 ([^)]*)' || true

      - name: Lint the package (lintian, non-blocking)
        continue-on-error: true
        run: lintian --no-tag-display-limit out/build/linux-package-release/remom_*_*.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: ReMoM-linux-deb
          path: out/build/linux-package-release/remom_*_*.deb

  # ── macOS (AppleClang, SDL2, self-contained ZIP via dylibbundler) ──────
  macos:
    name: macOS arm64
    runs-on: macos-latest
    # TBD (deferred, non-blocking): the pack(2) DOS structs place native pointers
    # at non-8-byte-aligned offsets (e.g. _unit_mutation_data), which the arm64
    # macOS linker rejects ("pointer not aligned"); x86-64 Linux/Windows link it
    # fine. See RELEASES.md "Known limitations". Re-enable once resolved.
    if: false

    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then RAW="${{ inputs.tag }}";
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then RAW="$GITHUB_REF_NAME";
          else RAW="0.0.0-dev"; fi
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${RAW#v}"

      - name: Install SDL2 and tools
        run: brew install sdl2 sdl2_mixer dylibbundler ninja

      - name: Configure (macos-release preset)
        run: cmake --preset macos-release -DREMOM_VERSION=${{ steps.ver.outputs.version }} -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build out/build/macos-release

      - name: Test (release gate)
        run: ctest --test-dir out/build/macos-release ${{ env.CTEST_ARGS }}

      - name: Assemble self-contained ZIP (bundle SDL dylibs)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="ReMoM-${VERSION}-Darwin-arm64"
          mkdir -p "$STAGE"
          BIN="$(find out/build/macos-release/bin -type f -name ReMoM | head -1)"
          cp "$BIN" "$STAGE/ReMoM"
          cp PLAYING.md "$STAGE/"
          # Copy SDL dylibs next to the binary and rewrite install names so the
          # app runs without Homebrew present.
          ( cd "$STAGE" && dylibbundler -od -b -x ./ReMoM -d ./libs -p @executable_path/libs )
          zip -r "${STAGE}.zip" "$STAGE"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ReMoM-macos-arm64
          path: ReMoM-*-Darwin-arm64.zip

  # ── GitHub Release (draft, tag pushes only) ────────────────────────────
  publish:
    name: Publish Release
    needs: [windows, linux, deb]   # macos deferred (TBD) -- see the macos job above
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/ReMoM-windows-x64/**/*
            dist/ReMoM-linux-x86_64/**/*
            dist/ReMoM-linux-deb/**/*
